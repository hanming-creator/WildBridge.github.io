<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account | WildKin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@500;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, .font-display { font-family: 'Lexend', sans-serif; }
        .bg-nature { background-color: #f0f4f0; }
        .text-forest { color: #2d4a22; }
        .bg-forest { background-color: #2d4a22; }
    </style>
</head>
<body class="bg-nature text-gray-800">
    <nav class="p-6">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-800 text-forest font-display tracking-tight">WildKin</a>
            <div class="flex gap-4">
                <a href="index.html" class="text-forest hover:underline font-medium">Home</a>
            </div>
        </div>
    </nav>
    <main class="container mx-auto px-6 py-12 text-center">
        <h1 class="text-4xl font-800 text-forest mb-6">Account Deletion Form</h1>
        <p class="text-xl text-gray-600 mb-8 max-w-2xl mx-auto">We're sorry to see you go. Fill out the form below to request deletion of your WildKin account and all associated data.</p>
        <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm text-left border border-gray-100">
            <form action="#" method="POST">
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2" for="email">Account Email</label>
                    <input class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-forest" type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 font-bold mb-2" for="reason">Reason (Optional)</label>
                    <textarea class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-forest" id="reason" name="reason" rows="3"></textarea>
                </div>
                <button type="submit" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 transition">Request Deletion</button>
            </form>
        </div>
    </main>
    <footer class="py-12 text-center text-gray-500">
        <p>&copy; 2023 WildKin. <a href="terms.html" class="underline">Terms</a> | <a href="privacy.html" class="underline">Privacy</a></p>
    </footer>
</body>
</html>
